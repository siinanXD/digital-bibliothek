<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buch hinzufügen</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="page narrow">
        <header class="page-header">
            <h1>Buch hinzufügen</h1>
            <a class="button ghost" href="/">Zurück zur Bibliothek</a>
        </header>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="flash-message">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        {% if success_message %}
            <div class="success-message">{{ success_message }}</div>
        {% endif %}

        <section class="form-card">
            <form method="POST" class="form-grid">
                <div class="field">
                    <label for="isbn">ISBN</label>
                    <input type="text" id="isbn" name="isbn" required>
                </div>

                <div class="field">
                    <label for="title">Titel</label>
                    <input type="text" id="title" name="title" required>
                </div>

                <div class="field">
                    <label for="publication_year">Erscheinungsjahr</label>
                    <input type="number" id="publication_year" name="publication_year">
                </div>

                <div class="field">
                    <label for="rating">Bewertung (1–10)</label>
                    <input type="number" id="rating" name="rating" min="1" max="10">
                </div>

                <div class="field">
                    <label for="author_id">Autor</label>
                    <select id="author_id" name="author_id" required>
                        <option value="">Bitte auswählen</option>
                        {% for author in authors %}
                            <option value="{{ author.id }}">{{ author.name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-actions">
                    <button class="button primary" type="submit">Buch speichern</button>
                </div>
            </form>
        </section>
    </div>
</body>
</html>
